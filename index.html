<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronica Mathematica — A Study Companion to the History of Mathematics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=IM+Fell+English+SC&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* =========================================================
   CHRONICA MATHEMATICA — STYLES
   ========================================================= */
:root {
  --ink: #1a1611;
  --ink-soft: #3a342b;
  --paper: #f4ecd8;
  --paper-dark: #e8dfc6;
  --paper-aged: #d9ccae;
  --parchment: #ebe0c4;
  --burgundy: #7a1f24;
  --burgundy-deep: #5c1519;
  --gilt: #a07527;
  --gilt-soft: #c99d48;
  --blue-ink: #1d3557;
  --foxing: rgba(122, 31, 36, 0.08);
  --seal-red: #8b2e2e;
  --rule: rgba(26, 22, 17, 0.25);
  --rule-strong: rgba(26, 22, 17, 0.5);
  --shadow: 0 1px 2px rgba(26, 22, 17, 0.18), 0 4px 14px rgba(26, 22, 17, 0.08);
  --display: 'Cormorant Garamond', 'Garamond', serif;
  --body: 'Crimson Pro', 'Georgia', serif;
  --small-caps: 'IM Fell English SC', 'Cormorant Garamond', serif;
  --mono: 'JetBrains Mono', 'Consolas', monospace;
}

/* Dark theme — invoked by data-theme="dark" on the <html> element */
html[data-theme="dark"] {
  --ink: #e8dcc0;
  --ink-soft: #b8a988;
  --paper: #1a1512;
  --paper-dark: #22180f;
  --paper-aged: #2a1f14;
  --parchment: #1f1711;
  --burgundy: #c9585c;
  --burgundy-deep: #e07378;
  --gilt: #d4a84f;
  --gilt-soft: #e5c275;
  --blue-ink: #86a4c9;
  --foxing: rgba(212, 168, 79, 0.06);
  --seal-red: #c9585c;
  --rule: rgba(232, 220, 192, 0.18);
  --rule-strong: rgba(232, 220, 192, 0.38);
  --shadow: 0 1px 2px rgba(0, 0, 0, 0.5), 0 4px 14px rgba(0, 0, 0, 0.3);
}

html[data-theme="dark"] body::before {
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(212, 168, 79, 0.015) 2px, rgba(212, 168, 79, 0.015) 3px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(232, 220, 192, 0.008) 3px, rgba(232, 220, 192, 0.008) 4px);
}

/* Ensure page transitions smoothly when toggling */
html, body, .math-card, .home-card, .topic-card, .quiz-mode-card, .flashcard-face,
.match-tile, .stats-card, .profile-action-btn, .quiz-choice, input, select, button {
  transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--body);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.55;
  font-size: 18px;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 10%, var(--foxing) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 70%, rgba(160, 117, 39, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 90%, rgba(26, 22, 17, 0.03) 0%, transparent 60%);
  background-attachment: fixed;
}

/* Subtle paper texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(92, 21, 25, 0.008) 2px, rgba(92, 21, 25, 0.008) 3px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(26, 22, 17, 0.005) 3px, rgba(26, 22, 17, 0.005) 4px);
  z-index: 1;
  opacity: 0.7;
}

a { color: var(--burgundy); text-decoration: none; border-bottom: 1px dotted var(--burgundy); transition: color 0.15s, border-color 0.15s, background 0.15s; }
a:hover { color: var(--burgundy-deep); border-bottom-style: solid; background: rgba(122, 31, 36, 0.05); }

h1, h2, h3, h4 { font-family: var(--display); font-weight: 500; letter-spacing: 0.01em; color: var(--ink); }
h1 { font-size: 2.8rem; font-weight: 600; line-height: 1.05; }
h2 { font-size: 2.1rem; font-weight: 500; line-height: 1.15; }
h3 { font-size: 1.5rem; font-weight: 500; }
h4 { font-size: 1.2rem; font-weight: 600; font-family: var(--small-caps); letter-spacing: 0.08em; }

.small-caps { font-family: var(--small-caps); letter-spacing: 0.08em; }

/* =========================================================
   LAYOUT
   ========================================================= */
.app { position: relative; z-index: 2; }

.header {
  padding: 1.6rem 2.5rem 1.2rem;
  border-bottom: 3px double var(--rule-strong);
  background: linear-gradient(180deg, rgba(244, 236, 216, 0.95) 0%, rgba(244, 236, 216, 0.9) 100%);
  backdrop-filter: blur(4px);
  position: sticky; top: 0; z-index: 100;
}

.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 2rem;
  align-items: center;
}

.brand {
  font-family: var(--display);
  font-size: 1.4rem;
  font-weight: 600;
  line-height: 1.1;
  border-bottom: none;
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

.brand:hover { background: none; color: var(--burgundy); }

.brand-title { font-size: 1.45rem; font-weight: 600; letter-spacing: 0.02em; }
.brand-sub { font-family: var(--small-caps); font-size: 0.68rem; letter-spacing: 0.18em; color: var(--gilt); margin-top: 2px; }

nav.main-nav {
  display: flex;
  gap: 1.8rem;
  justify-content: center;
  align-items: center;
  font-family: var(--small-caps);
  font-size: 0.78rem;
  letter-spacing: 0.12em;
}

nav.main-nav a {
  color: var(--ink-soft);
  border-bottom: 1px solid transparent;
  padding: 6px 3px;
  text-transform: uppercase;
}

nav.main-nav a.active { color: var(--burgundy); border-bottom-color: var(--burgundy); }
nav.main-nav a:hover { color: var(--burgundy); border-bottom-color: var(--burgundy); background: none; }

.search-box {
  position: relative;
  width: 260px;
  flex-shrink: 1;
  min-width: 140px;
}

.search-box input {
  width: 100%;
  padding: 8px 14px 8px 34px;
  font-family: var(--body);
  font-size: 0.95rem;
  background: var(--paper-dark);
  border: 1px solid var(--rule);
  border-radius: 2px;
  color: var(--ink);
  transition: border-color 0.15s, background 0.15s;
}

.search-box input:focus { outline: none; border-color: var(--burgundy); background: var(--parchment); }
.search-box::before {
  content: '⌕';
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 1.1rem; color: var(--ink-soft);
}

.search-results-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--paper);
  border: 1px solid var(--rule-strong);
  box-shadow: var(--shadow);
  max-height: 400px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}

.search-results-dropdown.active { display: block; }

.search-result-item {
  padding: 8px 12px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  font-size: 0.9rem;
}
.search-result-item:hover { background: var(--parchment); }
.search-result-item .res-name { font-family: var(--display); font-weight: 600; font-size: 1rem; }
.search-result-item .res-dates { font-size: 0.75rem; color: var(--ink-soft); }

/* Header tools (search + theme + account) */
.header-tools {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.icon-btn {
  height: 38px;
  padding: 0 12px;
  font-family: var(--small-caps);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  background: var(--paper-dark);
  color: var(--ink-soft);
  border: 1px solid var(--rule);
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.icon-btn:hover { background: var(--parchment); color: var(--burgundy); border-color: var(--burgundy); }

/* Theme toggle icon swap */
#theme-toggle { min-width: 38px; justify-content: center; padding: 0 10px; font-size: 1.05rem; }
html[data-theme="dark"] .theme-icon-light { display: none; }
html:not([data-theme="dark"]) .theme-icon-dark { display: none; }

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s;
  padding: 1rem;
}

.modal {
  background: var(--paper);
  border: 1px solid var(--rule-strong);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  max-width: 460px;
  width: 100%;
  padding: 2.2rem 2rem;
  position: relative;
  border-radius: 3px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h2 {
  font-family: var(--display);
  font-style: italic;
  font-weight: 500;
  font-size: 2rem;
  margin-bottom: 0.4rem;
  text-align: center;
}

.modal-sub {
  text-align: center;
  color: var(--ink-soft);
  font-size: 0.92rem;
  margin-bottom: 1.5rem;
  font-style: italic;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 14px;
  background: none;
  border: none;
  font-size: 1.6rem;
  color: var(--ink-soft);
  cursor: pointer;
  width: 30px;
  height: 30px;
  line-height: 1;
  padding: 0;
}
.modal-close:hover { color: var(--burgundy); }

.form-group { margin-bottom: 1rem; }
.form-group label {
  display: block;
  font-family: var(--small-caps);
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  color: var(--ink-soft);
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.form-group input {
  width: 100%;
  padding: 9px 12px;
  font-family: var(--body);
  font-size: 1rem;
  background: var(--paper-dark);
  border: 1px solid var(--rule);
  border-radius: 2px;
  color: var(--ink);
}
.form-group input:focus { outline: none; border-color: var(--burgundy); background: var(--parchment); }

.btn-primary {
  display: block;
  width: 100%;
  padding: 11px;
  font-family: var(--small-caps);
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  background: var(--burgundy);
  color: var(--paper);
  border: none;
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s;
  margin-top: 0.5rem;
}
.btn-primary:hover { background: var(--burgundy-deep); }
.btn-primary:disabled { opacity: 0.5; cursor: wait; }

.btn-secondary {
  display: block;
  width: 100%;
  padding: 11px;
  font-family: var(--small-caps);
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  background: var(--paper-dark);
  color: var(--ink);
  border: 1px solid var(--rule-strong);
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s;
  margin-top: 0.6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-secondary:hover { background: var(--parchment); }

.auth-divider {
  text-align: center;
  margin: 1.2rem 0 0.8rem;
  font-family: var(--small-caps);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--ink-soft);
  text-transform: uppercase;
  position: relative;
}
.auth-divider::before, .auth-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 20px);
  height: 1px;
  background: var(--rule);
}
.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }

.auth-toggle-link {
  display: block;
  text-align: center;
  margin-top: 1rem;
  font-size: 0.88rem;
  color: var(--burgundy);
  cursor: pointer;
  border-bottom: 1px dotted var(--burgundy);
  width: fit-content;
  margin-left: auto;
  margin-right: auto;
}
.auth-toggle-link:hover { color: var(--burgundy-deep); }

.auth-error {
  background: rgba(122, 31, 36, 0.12);
  border: 1px solid var(--burgundy);
  color: var(--burgundy);
  padding: 8px 12px;
  font-size: 0.88rem;
  border-radius: 2px;
  margin-bottom: 1rem;
  display: none;
}
.auth-error.shown { display: block; }

.auth-success {
  background: rgba(42, 157, 143, 0.12);
  border: 1px solid #2a9d8f;
  color: #2a9d8f;
  padding: 8px 12px;
  font-size: 0.88rem;
  border-radius: 2px;
  margin-bottom: 1rem;
  display: none;
}
.auth-success.shown { display: block; }

/* Account menu (dropdown when signed in) */
.account-menu {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  background: var(--paper);
  border: 1px solid var(--rule-strong);
  box-shadow: var(--shadow);
  min-width: 240px;
  z-index: 200;
  padding: 0.5rem 0;
  display: none;
  border-radius: 2px;
}
.account-menu.active { display: block; }
.account-menu-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--rule);
  font-size: 0.85rem;
  color: var(--ink-soft);
}
.account-menu-header strong { color: var(--ink); font-family: var(--display); font-size: 1rem; display: block; }
.account-menu-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 14px;
  font-size: 0.92rem;
  background: none;
  border: none;
  color: var(--ink);
  cursor: pointer;
  font-family: var(--body);
}
.account-menu-item:hover { background: var(--parchment); color: var(--burgundy); }

/* Account wrapper (for positioning menu) */
.account-wrapper { position: relative; }

/* Sync indicator */
.sync-indicator {
  font-family: var(--small-caps);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--gilt);
  margin-left: 0.6rem;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.3s;
}
.sync-indicator.shown { opacity: 1; }

main { max-width: 1440px; margin: 0 auto; padding: 3rem 2.5rem 5rem; }

/* =========================================================
   HOME PAGE
   ========================================================= */
.hero {
  text-align: center;
  padding: 2rem 0 4rem;
  position: relative;
}

.hero h1 {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 500;
  font-style: italic;
  line-height: 1;
  letter-spacing: -0.005em;
  margin-bottom: 0.5rem;
}
.hero h1 em { font-style: normal; color: var(--burgundy); }

.hero-sub {
  font-family: var(--small-caps);
  font-size: 1rem;
  letter-spacing: 0.22em;
  color: var(--gilt);
  text-transform: uppercase;
  margin-bottom: 2rem;
}

.hero-ornament {
  font-size: 2.5rem;
  color: var(--gilt);
  margin: 2rem auto;
  user-select: none;
  letter-spacing: 0.5em;
  line-height: 1;
}

.hero-blurb {
  max-width: 720px;
  margin: 0 auto;
  font-size: 1.15rem;
  color: var(--ink-soft);
  line-height: 1.65;
}
.hero-blurb em { color: var(--burgundy); font-style: italic; }

.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  margin-top: 4rem;
}

.home-card {
  padding: 1.8rem;
  background: linear-gradient(140deg, var(--parchment) 0%, var(--paper-dark) 100%);
  border: 1px solid var(--rule);
  border-radius: 2px;
  position: relative;
  cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s;
  display: block;
  color: inherit;
  border-bottom: 1px solid var(--rule);
}

.home-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
  background: linear-gradient(140deg, var(--paper) 0%, var(--parchment) 100%);
}

.home-card-num {
  font-family: var(--display);
  font-weight: 600;
  font-style: italic;
  color: var(--gilt);
  font-size: 2rem;
  line-height: 1;
  margin-bottom: 0.4rem;
}

.home-card h3 {
  margin-bottom: 0.5rem;
  color: var(--ink);
}

.home-card p {
  color: var(--ink-soft);
  font-size: 0.95rem;
  line-height: 1.5;
}

.home-card-arrow {
  color: var(--burgundy);
  font-family: var(--small-caps);
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  margin-top: 1rem;
  display: block;
}

.stats-band {
  display: flex;
  justify-content: center;
  gap: 4rem;
  flex-wrap: wrap;
  padding: 3rem 0 2rem;
  margin-top: 3rem;
  border-top: 3px double var(--rule-strong);
  border-bottom: 3px double var(--rule-strong);
}

.stat {
  text-align: center;
}

.stat-num {
  font-family: var(--display);
  font-size: 3rem;
  font-weight: 600;
  color: var(--burgundy);
  line-height: 1;
  font-variant-numeric: oldstyle-nums;
}

.stat-label {
  font-family: var(--small-caps);
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  color: var(--ink-soft);
  text-transform: uppercase;
  margin-top: 0.3rem;
}

.home-quote {
  padding: 3rem 2rem;
  max-width: 800px;
  margin: 4rem auto 0;
  text-align: center;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}

.home-quote blockquote {
  font-family: var(--display);
  font-size: 1.6rem;
  font-style: italic;
  color: var(--ink);
  line-height: 1.3;
}

.home-quote cite {
  display: block;
  margin-top: 1rem;
  font-family: var(--small-caps);
  font-size: 0.9rem;
  letter-spacing: 0.14em;
  color: var(--gilt);
  font-style: normal;
}

/* =========================================================
   BROWSE — FILTERS AND GRID
   ========================================================= */
.page-title-block {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 3px double var(--rule-strong);
}

.page-title-block h1 {
  font-style: italic;
  font-weight: 500;
  font-size: clamp(2rem, 5vw, 3rem);
  margin-bottom: 0.5rem;
}

.page-subtitle {
  color: var(--ink-soft);
  font-size: 1.05rem;
  font-style: italic;
}

.filter-panel {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 1rem;
  padding: 1.2rem;
  background: var(--paper-dark);
  border: 1px solid var(--rule);
  border-radius: 2px;
  margin-bottom: 2rem;
}

@media (max-width: 800px) {
  .filter-panel { grid-template-columns: 1fr 1fr; }
}

.filter-label {
  font-family: var(--small-caps);
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  color: var(--ink-soft);
  text-transform: uppercase;
  margin-bottom: 0.4rem;
  display: block;
}

.filter-panel select, .filter-panel input {
  width: 100%;
  padding: 8px 12px;
  font-family: var(--body);
  font-size: 1rem;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 2px;
  color: var(--ink);
}

.filter-panel select:focus, .filter-panel input:focus {
  outline: none; border-color: var(--burgundy);
}

.filter-clear {
  padding: 0 18px;
  align-self: end;
  height: 38px;
  font-family: var(--small-caps);
  font-size: 0.75rem;
  letter-spacing: 0.14em;
  background: transparent;
  color: var(--burgundy);
  border: 1px solid var(--burgundy);
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s, color 0.15s;
}
.filter-clear:hover { background: var(--burgundy); color: var(--paper); }

.result-count {
  font-family: var(--small-caps);
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  margin-bottom: 1rem;
  text-transform: uppercase;
}

.math-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.2rem;
}

.math-card {
  background: linear-gradient(170deg, var(--parchment) 0%, var(--paper) 100%);
  border: 1px solid var(--rule);
  padding: 1.3rem 1.3rem 1rem;
  position: relative;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  border-radius: 2px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.math-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  border-color: var(--gilt);
}

.math-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 40px; height: 40px;
  background: linear-gradient(135deg, transparent 49%, var(--foxing) 50%);
  pointer-events: none;
}

.math-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}

.math-card-name {
  font-family: var(--display);
  font-weight: 600;
  font-size: 1.35rem;
  line-height: 1.1;
  color: var(--ink);
}

.math-card-dates {
  font-family: var(--small-caps);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  white-space: nowrap;
  text-align: right;
  flex-shrink: 0;
}

.math-card-nat {
  font-family: var(--small-caps);
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  color: var(--burgundy);
  text-transform: uppercase;
}

.math-card-short {
  font-size: 0.93rem;
  color: var(--ink-soft);
  line-height: 1.45;
  margin-top: 0.3rem;
}

.math-card-fields {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-top: auto;
  padding-top: 0.5rem;
}

.field-pill {
  font-family: var(--small-caps);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  background: var(--paper-aged);
  color: var(--ink-soft);
  border-radius: 12px;
  text-transform: uppercase;
  border: 1px solid var(--rule);
}

.math-card-era-tag {
  position: absolute;
  bottom: 0; left: 0;
  padding: 2px 10px;
  font-family: var(--small-caps);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  color: var(--paper);
  text-transform: uppercase;
  border-top-right-radius: 2px;
}

/* =========================================================
   PROFILE PAGE
   ========================================================= */
.profile {
  max-width: 920px;
  margin: 0 auto;
}

.profile-header {
  padding-bottom: 2rem;
  border-bottom: 3px double var(--rule-strong);
  margin-bottom: 2.5rem;
  position: relative;
}

.profile-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--small-caps);
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  border-bottom: none;
  margin-bottom: 1.2rem;
  text-transform: uppercase;
}
.profile-back:hover { color: var(--burgundy); background: none; }

.profile-name {
  font-family: var(--display);
  font-style: italic;
  font-weight: 500;
  font-size: clamp(2.2rem, 5.5vw, 3.6rem);
  line-height: 1;
  margin-bottom: 0.5rem;
}

.profile-dates {
  font-family: var(--small-caps);
  font-size: 1rem;
  letter-spacing: 0.15em;
  color: var(--gilt);
  text-transform: uppercase;
}

.profile-meta {
  display: flex;
  gap: 2rem;
  margin-top: 1.2rem;
  font-size: 0.95rem;
  flex-wrap: wrap;
}

.profile-meta span {
  color: var(--ink-soft);
}
.profile-meta strong {
  color: var(--ink);
  font-weight: 600;
}

.profile-short {
  margin-top: 1.5rem;
  font-size: 1.15rem;
  font-style: italic;
  color: var(--burgundy-deep);
  line-height: 1.45;
}

.profile-actions {
  position: absolute;
  top: 0;
  right: 0;
  display: flex;
  gap: 0.5rem;
}

.profile-action-btn {
  padding: 6px 12px;
  font-family: var(--small-caps);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--rule-strong);
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s, color 0.15s;
}
.profile-action-btn:hover { background: var(--burgundy); color: var(--paper); border-color: var(--burgundy); }
.profile-action-btn.active { background: var(--gilt); color: var(--paper); border-color: var(--gilt); }

.profile-section {
  margin-bottom: 2.5rem;
}

.profile-section h3 {
  font-family: var(--small-caps);
  font-size: 1rem;
  letter-spacing: 0.2em;
  color: var(--gilt);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 0.4rem;
  margin-bottom: 1rem;
  text-transform: uppercase;
}

.profile-bio {
  font-size: 1.1rem;
  line-height: 1.75;
  color: var(--ink-soft);
  text-align: justify;
  hyphens: auto;
  column-rule: 1px solid var(--rule);
}

.profile-bio::first-letter {
  font-family: var(--display);
  font-size: 3.8rem;
  float: left;
  line-height: 0.85;
  padding: 0.3rem 0.5rem 0 0;
  color: var(--burgundy);
  font-weight: 600;
  font-style: italic;
}

.profile-list {
  list-style: none;
  margin-left: 0;
}

.profile-list li {
  padding: 0.45rem 0 0.45rem 1.5rem;
  border-bottom: 1px dotted var(--rule);
  position: relative;
  line-height: 1.5;
  color: var(--ink-soft);
}

.profile-list li:last-child { border-bottom: none; }

.profile-list li::before {
  content: '❧';
  position: absolute;
  left: 0;
  color: var(--gilt);
  font-size: 0.95rem;
}

.profile-list.works li::before { content: '✦'; }
.profile-list.ideas li::before { content: '◆'; color: var(--burgundy); }
.profile-list.trivia li::before { content: '§'; font-style: italic; }

.connections-box {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.connection-chip {
  padding: 5px 12px;
  background: var(--paper-dark);
  border: 1px solid var(--rule);
  border-radius: 16px;
  font-size: 0.85rem;
  color: var(--ink);
  font-family: var(--display);
  font-weight: 500;
  text-decoration: none;
  border-bottom: 1px solid var(--rule);
  transition: background 0.15s, border-color 0.15s;
}
.connection-chip:hover { background: var(--parchment); border-color: var(--burgundy); color: var(--burgundy); }

/* =========================================================
   TIMELINE
   ========================================================= */
.timeline {
  position: relative;
  padding: 2rem 0;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 120px;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, transparent 0%, var(--gilt) 10%, var(--gilt) 90%, transparent 100%);
}

.timeline-era-header {
  position: relative;
  margin: 3rem 0 1.5rem 0;
  padding-left: 160px;
}

.timeline-era-header h2 {
  font-family: var(--display);
  font-style: italic;
  font-weight: 500;
  font-size: 2.2rem;
  color: var(--burgundy);
}

.timeline-era-header p {
  color: var(--ink-soft);
  font-size: 1rem;
  margin-top: 0.4rem;
  max-width: 700px;
}

.timeline-era-range {
  position: absolute;
  left: 0;
  top: 8px;
  width: 110px;
  text-align: right;
  font-family: var(--small-caps);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  color: var(--gilt);
  text-transform: uppercase;
}

.timeline-entry {
  position: relative;
  padding: 0.8rem 0 0.8rem 160px;
  min-height: 50px;
}

.timeline-entry::before {
  content: '';
  position: absolute;
  left: 115px;
  top: 1.3rem;
  width: 12px;
  height: 12px;
  background: var(--paper);
  border: 2px solid var(--gilt);
  border-radius: 50%;
  z-index: 1;
  transition: background 0.15s, transform 0.15s;
}

.timeline-entry:hover::before { background: var(--burgundy); border-color: var(--burgundy); transform: scale(1.2); }

.timeline-entry .t-year {
  position: absolute;
  left: 0;
  top: 1.1rem;
  width: 100px;
  text-align: right;
  font-family: var(--display);
  font-weight: 600;
  font-size: 1rem;
  color: var(--ink);
  font-variant-numeric: oldstyle-nums;
}

.timeline-entry .t-name {
  font-family: var(--display);
  font-weight: 600;
  font-size: 1.2rem;
  color: var(--ink);
  border-bottom: none;
}
.timeline-entry .t-name:hover { color: var(--burgundy); background: none; }

.timeline-entry .t-desc {
  font-size: 0.95rem;
  color: var(--ink-soft);
  margin-top: 2px;
  max-width: 700px;
}

/* =========================================================
   TOPICS / FIELDS
   ========================================================= */
.topics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 1.5rem;
}

.topic-card {
  padding: 1.8rem;
  background: linear-gradient(145deg, var(--parchment), var(--paper));
  border: 1px solid var(--rule);
  border-left: 4px solid var(--burgundy);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  border-radius: 2px;
}

.topic-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }

.topic-card h3 {
  font-family: var(--display);
  font-size: 1.5rem;
  font-style: italic;
  color: var(--burgundy);
  margin-bottom: 0.5rem;
  text-transform: capitalize;
}

.topic-card .topic-count {
  font-family: var(--small-caps);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  margin-bottom: 0.8rem;
  text-transform: uppercase;
  display: block;
}

.topic-card .topic-people {
  font-size: 0.95rem;
  color: var(--ink);
  line-height: 1.5;
}

.topic-card .topic-people .more {
  color: var(--gilt);
  font-style: italic;
}

/* =========================================================
   QUIZ
   ========================================================= */
.quiz-mode-select {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.5rem;
  max-width: 1100px;
  margin: 0 auto;
}

.quiz-mode-card {
  padding: 2rem 1.6rem;
  background: linear-gradient(155deg, var(--parchment), var(--paper));
  border: 1px solid var(--rule);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  position: relative;
  border-radius: 2px;
  text-align: center;
}

.quiz-mode-card:hover { transform: translateY(-4px); border-color: var(--burgundy); box-shadow: var(--shadow); }

.quiz-mode-card .quiz-icon {
  font-family: var(--display);
  font-size: 3.5rem;
  color: var(--gilt);
  line-height: 1;
  margin-bottom: 0.6rem;
  font-style: italic;
  font-weight: 600;
}

.quiz-mode-card h3 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 1.4rem;
  margin-bottom: 0.5rem;
}

.quiz-mode-card p {
  font-size: 0.95rem;
  color: var(--ink-soft);
  line-height: 1.45;
}

.quiz-panel {
  max-width: 780px;
  margin: 0 auto;
  padding: 2.5rem 2rem;
  background: var(--paper);
  border: 1px solid var(--rule-strong);
  border-radius: 2px;
  position: relative;
}

.quiz-panel::before {
  content: '';
  position: absolute;
  inset: -4px;
  border: 1px solid var(--rule);
  pointer-events: none;
  border-radius: 2px;
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 1.5rem;
}

.quiz-progress {
  font-family: var(--small-caps);
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  text-transform: uppercase;
}

.quiz-exit {
  padding: 5px 12px;
  font-family: var(--small-caps);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--rule-strong);
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
}
.quiz-exit:hover { color: var(--burgundy); border-color: var(--burgundy); }

.quiz-timer {
  font-family: var(--mono);
  font-size: 1rem;
  color: var(--burgundy);
  font-weight: 500;
}

.quiz-question {
  font-family: var(--display);
  font-size: 1.5rem;
  line-height: 1.4;
  margin-bottom: 1.8rem;
  color: var(--ink);
}

.quiz-context {
  background: var(--parchment);
  padding: 0.8rem 1rem;
  border-left: 3px solid var(--gilt);
  font-style: italic;
  color: var(--ink-soft);
  margin-bottom: 1.3rem;
  font-size: 1rem;
}

.quiz-choices {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}

.quiz-choice {
  padding: 1rem 1.2rem;
  background: var(--parchment);
  border: 1px solid var(--rule);
  cursor: pointer;
  text-align: left;
  font-family: var(--body);
  font-size: 1.05rem;
  color: var(--ink);
  line-height: 1.4;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  border-radius: 2px;
  display: flex;
  align-items: flex-start;
  gap: 0.9rem;
}

.quiz-choice:hover { background: var(--paper-dark); border-color: var(--burgundy); }

.quiz-choice.correct {
  background: rgba(42, 157, 143, 0.15);
  border-color: #2a9d8f;
  color: var(--ink);
}

.quiz-choice.wrong {
  background: rgba(122, 31, 36, 0.12);
  border-color: var(--burgundy);
}

.quiz-choice.disabled {
  cursor: default;
  pointer-events: none;
}

.quiz-choice-letter {
  font-family: var(--display);
  font-weight: 700;
  font-style: italic;
  font-size: 1.2rem;
  color: var(--gilt);
  min-width: 24px;
}

.quiz-feedback {
  margin-top: 1.5rem;
  padding: 1rem 1.2rem;
  background: var(--paper-dark);
  border: 1px solid var(--rule);
  border-radius: 2px;
  font-size: 1rem;
  color: var(--ink);
  display: none;
}
.quiz-feedback.shown { display: block; }
.quiz-feedback strong { color: var(--burgundy); }

.quiz-next-btn {
  display: block;
  margin: 1.5rem auto 0;
  padding: 10px 32px;
  font-family: var(--small-caps);
  font-size: 0.9rem;
  letter-spacing: 0.14em;
  background: var(--burgundy);
  color: var(--paper);
  border: none;
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s;
}
.quiz-next-btn:hover { background: var(--burgundy-deep); }

.quiz-result {
  text-align: center;
  padding: 2rem 1rem;
}

.quiz-result-score {
  font-family: var(--display);
  font-size: 5rem;
  font-weight: 600;
  font-style: italic;
  color: var(--burgundy);
  line-height: 1;
}

.quiz-result-total {
  font-family: var(--display);
  font-size: 1.5rem;
  color: var(--ink-soft);
  margin-top: 0.5rem;
}

.quiz-result-msg {
  font-family: var(--display);
  font-size: 1.5rem;
  font-style: italic;
  color: var(--ink);
  margin-top: 1.5rem;
}

.quiz-review-list {
  margin-top: 2rem;
  text-align: left;
  max-height: 350px;
  overflow-y: auto;
  border-top: 1px solid var(--rule);
  padding-top: 1rem;
}
.quiz-review-item {
  padding: 0.6rem 0;
  border-bottom: 1px dotted var(--rule);
  font-size: 0.92rem;
}
.quiz-review-item .rev-q { color: var(--ink); font-weight: 500; }
.quiz-review-item .rev-a { color: var(--ink-soft); font-size: 0.88rem; margin-top: 0.2rem; }
.quiz-review-item .rev-mark { font-family: var(--display); font-style: italic; font-weight: 700; margin-right: 6px; }
.quiz-review-item .rev-mark.correct { color: #2a9d8f; }
.quiz-review-item .rev-mark.wrong { color: var(--burgundy); }

/* FLASHCARD */
.flashcard-container {
  max-width: 620px;
  margin: 0 auto;
  perspective: 1500px;
}

.flashcard {
  position: relative;
  width: 100%;
  height: 400px;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.flashcard.flipped { transform: rotateY(180deg); }

.flashcard-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  padding: 2.5rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: linear-gradient(155deg, var(--parchment) 0%, var(--paper) 100%);
  border: 1px solid var(--rule-strong);
  border-radius: 4px;
  box-shadow: var(--shadow);
}

.flashcard-back { transform: rotateY(180deg); overflow-y: auto; align-items: stretch; text-align: left; }

.flashcard-front h2 {
  font-family: var(--display);
  font-size: 2.4rem;
  font-weight: 500;
  font-style: italic;
  margin-bottom: 0.6rem;
  line-height: 1.1;
}

.flashcard-front .fc-dates {
  font-family: var(--small-caps);
  letter-spacing: 0.14em;
  color: var(--gilt);
  font-size: 0.9rem;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.flashcard-front .fc-nat {
  font-family: var(--small-caps);
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  margin-bottom: 1.8rem;
  text-transform: uppercase;
}

.flashcard-front .fc-hint {
  position: absolute;
  bottom: 1rem;
  font-family: var(--small-caps);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  color: var(--gilt);
  text-transform: uppercase;
}

.flashcard-back h3 {
  font-family: var(--small-caps);
  font-size: 0.85rem;
  letter-spacing: 0.14em;
  color: var(--gilt);
  text-transform: uppercase;
  margin-bottom: 0.4rem;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 3px;
}

.flashcard-back .fc-section { margin-bottom: 1rem; }
.flashcard-back .fc-section p { font-size: 0.95rem; color: var(--ink-soft); line-height: 1.5; }
.flashcard-back .fc-section ul { list-style: none; padding: 0; font-size: 0.9rem; }
.flashcard-back .fc-section ul li { padding: 3px 0 3px 1rem; position: relative; color: var(--ink); }
.flashcard-back .fc-section ul li::before { content: '•'; position: absolute; left: 2px; color: var(--gilt); }

.flashcard-controls {
  display: flex;
  justify-content: center;
  gap: 0.8rem;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}

.flashcard-btn {
  padding: 10px 20px;
  font-family: var(--small-caps);
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--rule-strong);
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s, color 0.15s;
}
.flashcard-btn:hover { background: var(--ink); color: var(--paper); }
.flashcard-btn.primary { background: var(--burgundy); color: var(--paper); border-color: var(--burgundy); }
.flashcard-btn.primary:hover { background: var(--burgundy-deep); }
.flashcard-btn.success { color: #2a9d8f; border-color: #2a9d8f; }
.flashcard-btn.success:hover { background: #2a9d8f; color: var(--paper); }
.flashcard-btn.danger { color: var(--burgundy); border-color: var(--burgundy); }
.flashcard-btn.danger:hover { background: var(--burgundy); color: var(--paper); }

/* MATCHING GAME */
.matching-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  max-width: 800px;
  margin: 0 auto;
}

.match-tile {
  padding: 1rem 1.2rem;
  background: var(--parchment);
  border: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
  font-family: var(--body);
  font-size: 1rem;
  min-height: 64px;
  display: flex;
  align-items: center;
  border-radius: 2px;
}
.match-tile:hover:not(.matched):not(.selected) { background: var(--paper-dark); border-color: var(--burgundy); }
.match-tile.selected { background: var(--gilt); color: var(--paper); border-color: var(--gilt); }
.match-tile.matched { background: rgba(42, 157, 143, 0.2); border-color: #2a9d8f; pointer-events: none; opacity: 0.55; }
.match-tile.wrong { background: rgba(122, 31, 36, 0.2); border-color: var(--burgundy); animation: shake 0.4s; }
.match-tile.person { font-family: var(--display); font-weight: 600; font-style: italic; font-size: 1.1rem; }
.match-tile.fact { font-size: 0.95rem; line-height: 1.35; color: var(--ink-soft); }
.match-tile.fact strong { color: var(--ink); font-style: normal; font-weight: 600; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* =========================================================
   STUDY STATS PAGE
   ========================================================= */
.stats-card {
  background: var(--parchment);
  border: 1px solid var(--rule);
  padding: 1.5rem;
  border-radius: 2px;
}

.stats-card h3 {
  font-family: var(--small-caps);
  font-size: 0.85rem;
  letter-spacing: 0.14em;
  color: var(--gilt);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}

.stats-row {
  display: flex;
  justify-content: space-between;
  padding: 0.5rem 0;
  border-bottom: 1px dotted var(--rule);
  font-size: 0.95rem;
}
.stats-row:last-child { border-bottom: none; }
.stats-row strong { font-family: var(--display); font-weight: 600; color: var(--burgundy); font-size: 1.05rem; }

/* =========================================================
   UTILITIES
   ========================================================= */
.hidden { display: none !important; }

.page-hidden { display: none; }

footer {
  margin-top: 5rem;
  padding: 2rem;
  text-align: center;
  font-family: var(--small-caps);
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  color: var(--ink-soft);
  text-transform: uppercase;
  border-top: 3px double var(--rule);
}

footer span { color: var(--gilt); }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--paper-dark); }
::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--burgundy); }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.page { animation: fadeIn 0.4s ease-out; }

/* Mobile */
@media (max-width: 720px) {
  .header { padding: 1rem 1.2rem; }

  .search-box { width: 100%; flex: 1 1 100%; min-width: 0; }

  .stats-band { gap: 2rem; padding: 2rem 0; }
  .filter-panel { grid-template-columns: 1fr; }
  .profile-actions { position: static; margin-top: 1rem; }
  .timeline::before { left: 30px; }
  .timeline-era-header { padding-left: 50px; }
  .timeline-era-range { position: static; text-align: left; width: auto; padding-left: 50px; }
  .timeline-entry { padding: 0.6rem 0 0.6rem 50px; }
  .timeline-entry::before { left: 25px; }
  .timeline-entry .t-year { position: static; width: auto; display: block; text-align: left; font-size: 0.9rem; }
  .matching-grid { grid-template-columns: 1fr; }
  .modal { padding: 1.8rem 1.4rem; }
}
